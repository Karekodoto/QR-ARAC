<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            font-family: sans-serif;
            overflow: hidden;
        }

        .card {
            width: 85%;
            max-width: 340px;
            padding: 25px 20px;
            text-align: center;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.26);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        /* Yeni Dacia Logosu */
        .brand-header {
            margin-bottom: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .brand-header img {
            width: 180px;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .team-section {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px 0;
            height: 105px;
        }

        /* YILDIZ DÜZENİ: Tam istediğiniz koddaki gibi (1 üstte, 4 altta yay) */
        .star-container {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .star-top {
            margin-bottom: 2px;
        }

        .star-bottom-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .fas.fa-star {
            color: #FFB100;
            font-size: 13px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        /* Alt sıradaki 4 yıldız yay efekti */
        .star-bottom-row i:nth-child(1) { transform: translateY(4px) rotate(-15deg); }
        .star-bottom-row i:nth-child(2) { transform: translateY(0px); }
        .star-bottom-row i:nth-child(3) { transform: translateY(0px); }
        .star-bottom-row i:nth-child(4) { transform: translateY(4px) rotate(15deg); }

        .team-logo {
            height: 60px;
            margin-top: -5px;
            z-index: 1;
        }

        .plate-box {
            display: inline-flex;
            border: 2.5px solid #000;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            margin-top: 5px;
        }

        .plate-no {
            color: black;
            font-size: 24px;
            font-weight: 900;
            padding: 5px 12px;
            font-family: 'Arial Black';
        }

        .kan-tag {
            background: #E30A17;
            color: white;
            padding: 4px 15px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: bold;
            margin-top: 8px;
            display: inline-block;
        }

        h1 {
            color: #000;
            font-size: 1.4rem;
            margin: 12px 0;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: -0.5px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 900;
            color: white;
            font-size: 15px;
            gap: 10px;
        }

        .btn-tel { background: #333; }
        .btn-wp { background: #25D366; }
        .btn-insta { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%,#d6249f 60%,#285AEB 90%); }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand-header">
            <img src="https://images.seeklogo.com/logo-png/39/2/dacia-new-2021-logo-png_seeklogo-399843.png" alt="Dacia Logo">
        </div>

        <div class="team-section">
            <div class="star-container">
                <div class="star-top"><i class="fas fa-star"></i></div>
                <div class="star-bottom-row">
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                </div>
            </div>
            <img src="https://img.icons8.com/color/144/galatasaray.png" class="team-logo">
        </div>

        <div>
            <div class="plate-box">
                <div style="background:#003399; color:white; width:25px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:10px;">TR</div>
                <div class="plate-no">34 PFK 878</div>
            </div>
            <br>
            <div class="kan-tag">0 Rh+</div>
        </div>

        <h1>NURETTİN YURTSEVER</h1>

        <div class="btn-container">
            <a href="tel:05396591437" class="btn btn-tel"><i class="fas fa-phone-alt"></i> ARA</a>
            <a href="https://wa.me/905396591437" class="btn btn-wp"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
            <a href="https://instagram.com/byrtsvr" class="btn btn-insta"><i class="fab fa-instagram"></i> INSTAGRAM</a>
        </div>
    </div>
</body>
</html>
