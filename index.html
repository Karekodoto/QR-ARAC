<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP QR OTOMATİK PANEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { text-align: center; padding: 40px 20px; border-bottom: 2px solid #d4af37; width: 100%; background: #111; margin-bottom: 30px; }
        h1 { color: #d4af37; text-transform: uppercase; letter-spacing: 4px; margin: 0; font-size: 1.5rem; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 20px; width: 90%; max-width: 1200px; }
        .card-link { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 20px; text-decoration: none; color: white; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .card-link:hover { border-color: #d4af37; background: #222; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(212,175,55,0.2); }
        .plaka { font-weight: 900; font-family: 'Arial Black'; text-transform: uppercase; font-size: 1.2rem; }
        .label { font-size: 0.7rem; color: #d4af37; margin-bottom: 4px; }
        #loading { margin-top: 50px; color: #d4af37; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="header">
    <h1><i class="fas fa-qrcode"></i> VIP OTOMATİK PANEL</h1>
    <p id="counter" style="color: #888; margin-top: 10px;">Dosyalar taranıyor...</p>
</div>

<div id="loading"><i class="fas fa-spinner fa-spin"></i> Dosyalar Yükleniyor...</div>
<div class="container" id="file-list"></div>

<script>
    const username = "Karekodoto"; //
    const repo = "QR-ARAC"; //
    const baseUrl = `https://${username}.github.io/${repo}/`; // GitHub Pages temel adresi

    async function getFiles() {
        try {
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`); //
            const files = await response.json();
            const listDiv = document.getElementById('file-list');
            const loadingDiv = document.getElementById('loading');
            
            // Sadece plakaları filtrele (index, uretim ve readme hariç)
            let htmlFiles = files.filter(file => 
                file.name.toLowerCase().endsWith('.html') && 
                file.name.toLowerCase() !== 'index.html' && 
                file.name.toLowerCase() !== 'uretim.html'
            );
            
            loadingDiv.style.display = 'none';
            document.getElementById('counter').innerText = `${htmlFiles.length} Kayıtlı Araç Listelendi`;

            htmlFiles.forEach(file => {
                const cleanName = file.name.replace('.html', '').replace(/-/g, ' ');
                // Linki tam adres (absolute URL) olarak oluşturuyoruz
                const fullLink = baseUrl + file.name;
                
                const card = `
                    <a href="${fullLink}" class="card-link" target="_blank">
                        <div class="info">
                            <div class="label">PLAKA / DOSYA</div>
                            <div class="plaka">${cleanName}</div>
                        </div>
                        <i class="fas fa-external-link-alt" style="color: #d4af37; opacity: 0.7;"></i>
                    </a>
                `;
                listDiv.innerHTML += card;
            });
        } catch (error) {
            document.getElementById('loading').innerText = "Hata: Dosyalar alınamadı!";
        }
    }

    getFiles();
</script>
</body>
</html>
